name: Daily Snapshot

on:
  schedule:
    - cron: '0 16 * * *'  # 21:30 IST (16:00 UTC) — 30 min before Slack trigger
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install gspread google-auth requests pypdfium2

      - name: Generate snapshots
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python generate_snapshots.py

      - name: Commit & push
        run: |
          git config user.email "shariq.khan@wiom.in"
          git config user.name "snapshot-bot"
          git add summary_*.png
          if git diff --staged --quiet; then
            echo "No new snapshot."
          else
            git commit -m "snapshot $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')"
            git push
          fi
